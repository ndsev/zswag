name: Code Coverage

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    container: ghcr.io/klebert-engineering/manylinux-cpp17-py3.11-x86_64:2025.1
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install coverage tools
        run: |
          pip install gcovr
          gcovr --version

      - name: Configure with coverage enabled
        run: |
          python3 -m venv venv && . ./venv/bin/activate
          pip install -U setuptools wheel pip
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -DZSWAG_ENABLE_TESTING=ON \
                -DZSWAG_ENABLE_COVERAGE=ON \
                -DZSWAG_BUILD_WHEELS=OFF \
                -DZSWAG_KEYCHAIN_SUPPORT=OFF ..

      - name: Build
        working-directory: build
        run: |
          . ../venv/bin/activate
          cmake --build .

      - name: Test
        working-directory: build
        run: |
          . ../venv/bin/activate
          ctest -C Debug --verbose --no-tests=error

      - name: Generate Coverage Reports
        run: |
          mkdir -p coverage
          gcovr \
            --root . \
            --filter 'libs/httpcl/(src|include)/.*' \
            --filter 'libs/zswagcl/(src|include)/.*' \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --html-details coverage/coverage.html
          gcovr \
            --root . \
            --filter 'libs/httpcl/(src|include)/.*' \
            --filter 'libs/zswagcl/(src|include)/.*' \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --cobertura coverage.xml \
            --html coverage.html

      - name: Publish Coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage
          retention-days: 30

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: false
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '65 80'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
